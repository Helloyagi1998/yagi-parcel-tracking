<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yagi Parcel Tracking</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
  background: linear-gradient(135deg,#0b1f3a,#1d4ed8);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  color:white;
}

/* DARK MODE BACK */
body.dark{
  background: linear-gradient(135deg,#050b14,#0b1220);
}

.tracking-container{
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(12px);
  width:100%;
  max-width:620px;
  padding:40px 30px;
  border-radius:22px;
}

h1{text-align:center;color:gold;}
p{text-align:center;margin-bottom:20px;}

.input-box{display:flex;flex-direction:column;gap:14px;}

input,select{
  padding:14px;
  border:none;
  border-radius:10px;
}

button{
  background:gold;
  border:none;
  padding:14px;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.result-box{display:none;margin-top:20px;}
.error{display:none;color:red;margin-top:10px;}

.admin-section{display:none;}

table{
  width:100%;
  margin-top:20px;
}

td,th{padding:10px;}
</style>
</head>

<body>

<div class="tracking-container">

<!-- DARK MODE BUTTON -->
<button onclick="toggleDarkMode()" style="float:right;">🌙</button>

<!-- CUSTOMER -->
<div id="customerView">
<h1>📦 Yagi Parcel Tracking</h1>

<div class="input-box">
<input id="trackingInput" placeholder="Tracking ID">
<button onclick="trackParcel()">Track</button>
</div>

<div id="errorMsg" class="error">Not found</div>

<div id="resultBox" class="result-box">
<p>ID: <span id="trackId"></span></p>
<p>Sender: <span id="sender"></span></p>
<p>Receiver: <span id="receiver"></span></p>
<p>Status: <span id="status"></span></p>
</div>

<div id="progressBar" style="margin-top:20px;">
  <div style="display:flex; justify-content:space-between; font-size:12px;">
    <span id="step1">Pending</span>
    <span id="step2">Transit</span>
    <span id="step3">Delivered</span>
  </div>

  <div style="height:8px; background:#ddd; border-radius:10px; margin-top:5px;">
    <div id="progressFill" style="height:8px; width:0%; background:gold; border-radius:10px;"></div>
  </div>
</div>

<br>
<button onclick="showAdminLogin()">Admin</button>
</div>

<!-- LOGIN -->
<div id="adminLoginView" class="admin-section">
<h1>Admin Login</h1>

<input id="adminUser" value="admin">
<input id="adminPass" value="admin123">

<button onclick="adminLogin()">Login</button>
<button onclick="showCustomerView()">Back</button>
</div>

<!-- DASHBOARD -->
<div id="adminDashboard" class="admin-section">
<h1>Dashboard</h1>

<input id="newTrackingId" placeholder="Tracking ID">
<input id="newSender" placeholder="Sender">
<input id="newReceiver" placeholder="Receiver">
<input id="newOrigin" placeholder="Origin">
<input id="newDestination" placeholder="Destination">

<select id="newStatus">
<option>Pending Pickup</option>
<option>In Transit</option>
<option>Delivered</option>
</select>

<button onclick="createNewParcel()">Create</button>

<table>
<thead>
<tr>
<th>ID</th>
<th>Status</th>
<th>Change</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<button onclick="logout()">Logout</button>
</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBVlxuIxDFLwVLSgPQO7KGgxYiW0IY6BDs",
  authDomain: "yagiparcel.firebaseapp.com",
  databaseURL: "https://yagiparcel-default-rtdb.firebaseio.com/",
  projectId: "yagiparcel"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* DARK MODE */
function toggleDarkMode(){
  document.body.classList.toggle("dark");
}

/* NAV */
function showAdminLogin(){
  customerView.style.display="none";
  adminLoginView.style.display="block";
}
function showCustomerView(){
  customerView.style.display="block";
  adminLoginView.style.display="none";
  adminDashboard.style.display="none";
}

/* LOGIN */
function adminLogin(){
  if(adminUser.value==="admin" && adminPass.value==="admin123"){
    adminLoginView.style.display="none";
    adminDashboard.style.display="block";
    renderTable();
  }else alert("Wrong login");
}

function logout(){
  showCustomerView();
}

/* CREATE */
function createNewParcel(){
  let id=newTrackingId.value.trim().toUpperCase() || "YAG"+Math.floor(Math.random()*99999);

  db.ref("parcels/"+id).set({
    sender:newSender.value,
    receiver:newReceiver.value,
    origin:newOrigin.value,
    destination:newDestination.value,
    status:newStatus.value
  });

  alert("Created: "+id);
}

/* TABLE */
function renderTable(){
  db.ref("parcels").on("value",snap=>{
    tableBody.innerHTML="";
    snap.forEach(child=>{
      let p=child.val();
      tableBody.innerHTML+=`
      <tr>
        <td>${child.key}</td>
        <td>${p.status}</td>
        <td>
        <select onchange="updateStatus('${child.key}',this.value)">
          <option>Pending Pickup</option>
          <option>In Transit</option>
          <option>Delivered</option>
        </select>
        </td>
      </tr>`;
    });
  });
}

/* UPDATE */
function updateStatus(id,val){
  db.ref("parcels/"+id).update({status:val});
}

/* TRACK */
function trackParcel(){
  let id=trackingInput.value.trim().toUpperCase();

  db.ref("parcels/"+id).on("value",snap=>{
    if(snap.exists()){
      let p=snap.val();
      trackId.innerText=id;
      sender.innerText=p.sender;
      receiver.innerText=p.receiver;
      status.innerText=p.status;
      updateProgress(p.status);
      resultBox.style.display="block";
      errorMsg.style.display="none";
    }else{
      resultBox.style.display="none";
      errorMsg.style.display="block";
    }
  });
}

function updateProgress(status){
  let fill = document.getElementById("progressFill");

  if(status === "Pending Pickup"){
    fill.style.width = "33%";
  }
  else if(status === "In Transit"){
    fill.style.width = "66%";
  }
  else if(status === "Delivered"){
    fill.style.width = "100%";
  }
}

showCustomerView();
</script>

</body>
</html>
