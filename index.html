<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yagi Parcel Tracking</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
      transition: 0.3s;
    }

    body {
      background: linear-gradient(135deg, #0b1f3a, #1d4ed8);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: white;
    }

    body.dark {
      background: linear-gradient(135deg, #050b14, #0b1220);
    }

    .tracking-container {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      width: 100%;
      max-width: 600px;
      padding: 35px 25px;
      border-radius: 22px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    h1 {
      font-size: 30px;
      color: gold;
    }

    .dark-btn {
      background: gold;
      color: black;
      border: none;
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
    }

    p {
      margin-bottom: 20px;
      font-size: 17px;
      color: #f0f0f0;
      line-height: 1.6;
    }

    .input-box {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 25px;
    }

    .input-box input {
      padding: 15px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      outline: none;
    }

    .input-box button {
      background: gold;
      color: black;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
    }

    .input-box button:hover,
    .dark-btn:hover {
      transform: scale(1.03);
    }

    .result-box {
      display: none;
      background: rgba(255, 255, 255, 0.12);
      padding: 22px;
      border-radius: 18px;
      margin-top: 15px;
      text-align: left;
    }

    .result-box h2 {
      text-align: center;
      color: gold;
      margin-bottom: 18px;
      font-size: 24px;
    }

    .result-box p {
      margin: 10px 0;
      font-size: 17px;
      color: white;
    }

    .status {
      font-weight: bold;
      color: #22c55e;
      font-size: 18px;
    }

    .error {
      display: none;
      margin-top: 15px;
      background: rgba(239, 68, 68, 0.15);
      padding: 14px;
      border-radius: 12px;
      color: #ffb3b3;
      font-weight: bold;
    }

    .progress {
      display: flex;
      justify-content: space-between;
      margin-top: 25px;
      gap: 10px;
    }

    .step {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.12);
      text-align: center;
      font-size: 14px;
      font-weight: bold;
      opacity: 0.5;
    }

    .step.active {
      background: gold;
      color: black;
      opacity: 1;
    }
  </style>
</head>
<body>

  <div class="tracking-container">
    <div class="top-bar">
      <h1>📦 Yagi Parcel Tracking</h1>
      <button class="dark-btn" onclick="toggleDarkMode()">🌙</button>
    </div>

    <p>Track your package easily by entering your tracking ID below.</p>

    <div class="input-box">
      <input type="text" id="trackingInput" placeholder="Enter Tracking ID (e.g. YAG12345)">
      <button onclick="trackParcel()">Track Parcel</button>
    </div>

    <div class="error" id="errorMsg">Tracking ID not found. Please try again.</div>

    <div class="result-box" id="resultBox">
      <h2>Shipment Details</h2>
      <p><strong>Tracking ID:</strong> <span id="trackId"></span></p>
      <p><strong>Sender:</strong> <span id="sender"></span></p>
      <p><strong>Receiver:</strong> <span id="receiver"></span></p>
      <p><strong>Origin:</strong> <span id="origin"></span></p>
      <p><strong>Destination:</strong> <span id="destination"></span></p>
      <p><strong>Current Location:</strong> <span id="location"></span></p>
      <p><strong>Estimated Delivery:</strong> <span id="deliveryDate"></span></p>
      <p><strong>Status:</strong> <span class="status" id="status"></span></p>

      <div class="progress">
        <div class="step" id="step1">Pending</div>
        <div class="step" id="step2">In Transit</div>
        <div class="step" id="step3">Delivered</div>
      </div>
    </div>
  </div>

  <script>
    function toggleDarkMode() {
      document.body.classList.toggle("dark");
    }

    function trackParcel() {
      const trackingInput = document.getElementById("trackingInput").value.trim().toUpperCase();
      const resultBox = document.getElementById("resultBox");
      const errorMsg = document.getElementById("errorMsg");

      const parcels = {
        "YAG12345": {
          sender: "Sunday Emmanuel",
          receiver: "Michael Johnson",
          origin: "Abuja, Nigeria",
          destination: "Lagos, Nigeria",
          location: "Lokoja, Nigeria",
          deliveryDate: "April 5, 2026",
          status: "In Transit"
        },
        "YAG67890": {
          sender: "Sarah James",
          receiver: "David Smith",
          origin: "London, UK",
          destination: "Toronto, Canada",
          location: "Toronto, Canada",
          deliveryDate: "Delivered on April 1, 2026",
          status: "Delivered"
        },
        "YAG11111": {
          sender: "Grace Wilson",
          receiver: "Esther Paul",
          origin: "Dubai, UAE",
          destination: "Abuja, Nigeria",
          location: "Dubai, UAE",
          deliveryDate: "April 8, 2026",
          status: "Pending Pickup"
        }
      };

      if (parcels[trackingInput]) {
        const parcel = parcels[trackingInput];

        document.getElementById("trackId").textContent = trackingInput;
        document.getElementById("sender").textContent = parcel.sender;
        document.getElementById("receiver").textContent = parcel.receiver;
        document.getElementById("origin").textContent = parcel.origin;
        document.getElementById("destination").textContent = parcel.destination;
        document.getElementById("location").textContent = parcel.location;
        document.getElementById("deliveryDate").textContent = parcel.deliveryDate;
        document.getElementById("status").textContent = parcel.status;

        localStorage.setItem("lastTrackingID", trackingInput);

        resultBox.style.display = "block";
        errorMsg.style.display = "none";

        updateProgress(parcel.status);
      } else {
        resultBox.style.display = "none";
        errorMsg.style.display = "block";
      }
    }

    function updateProgress(status) {
      document.getElementById("step1").classList.remove("active");
      document.getElementById("step2").classList.remove("active");
      document.getElementById("step3").classList.remove("active");

      if (status === "Pending Pickup") {
        document.getElementById("step1").classList.add("active");
      } else if (status === "In Transit") {
        document.getElementById("step1").classList.add("active");
        document.getElementById("step2").classList.add("active");
      } else if (status === "Delivered") {
        document.getElementById("step1").classList.add("active");
        document.getElementById("step2").classList.add("active");
        document.getElementById("step3").classList.add("active");
      }
    }

    window.onload = function () {
      const lastTrackingID = localStorage.getItem("lastTrackingID");
      if (lastTrackingID) {
        document.getElementById("trackingInput").value = lastTrackingID;
      }
    };
  </script>

</body>
</html>
